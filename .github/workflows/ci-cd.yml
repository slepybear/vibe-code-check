# GitHub Actions CI/CD 配置

name: VibeCode Check CI/CD

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'
  PNPM_VERSION: '8'

jobs:
  # ============================================================
  # Job 1: Lint & Type Check
  # ============================================================
  lint-and-typecheck:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npx tsc --noEmit

  # ============================================================
  # Job 2: Build Test
  # ============================================================
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-output
          path: out/
          retention-days: 7

  # ============================================================
  # Job 3: Deploy to Vercel (only on main branch)
  # ============================================================
  deploy-vercel:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

  # ============================================================
  # Job 4: Deploy to Cloudflare Pages (alternative)
  # ============================================================
  deploy-cloudflare:
    name: ☁️ Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@1.3.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=vibe-code-check

  # ============================================================
  # Job 5: Create GitHub Release (on version tags)
  # ============================================================
  release:
    name: 🎉 Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # 获取版本号
          VERSION=${GITHUB_REF#refs/tags/v}
          
          # 生成变更日志（基于git log）
          echo "## 🎉 VibeCode Check ${VERSION}" > release-notes.md
          echo "" >> release-notes.md
          echo "### ✨ 新功能" >> release-notes.md
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 @^)..HEAD | head -10 >> release-notes.md || echo "- Initial release" >> release-notes.md
          echo "" >> release-notes.md
          echo "### 🐛 Bug 修复" >> release-notes.md
          echo "" >> release-notes.md
          echo "### 🔧 改进" >> release-notes.md
          echo "" >> release-notes.md
          echo "---" >> release-notes.md
          echo "" >> release-notes.md
          echo "**完整更新日志:** https://github.com/${{ github.repository }}/compare/v${VERSION#v}...main" >> release-notes.md
          
          # 输出文件内容用于后续步骤
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          body_path: release-notes.md
          generate_release_notes: false

  # ============================================================
  # Job 6: Notify on failure
  # ============================================================
  notify-on-failure:
    name: 📧 Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, build]
    if: failure()
    steps:
      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"❌ VibeCode Check CI Failed\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nActor: ${{ github.actor }}\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|查看详情>"}' \
            "$SLACK_WEBHOOK_URL"
